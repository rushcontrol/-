<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="Дальнобойщики">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a14">
<link rel="manifest" href="manifest.json">
<title>Дальнобойщики</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;overflow:hidden;height:100dvh;width:100vw;
  font-family:'Share Tech Mono',monospace;user-select:none;
  -webkit-user-select:none;touch-action:manipulation}
#app{width:100%;height:100%;position:relative;overflow:hidden}
canvas{position:absolute;top:0;left:0;display:block}
#rc{z-index:10}
#sc{z-index:20;pointer-events:none}
#wc{z-index:22;pointer-events:none;opacity:0;transition:opacity 2s}
#wc.on{opacity:1}

/* TOP BAR */
#topbar{position:absolute;top:0;left:0;right:0;height:38px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;z-index:200;
  background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent)}
.chip{background:rgba(6,6,16,.82);border:1px solid rgba(255,255,255,.13);
  border-radius:18px;padding:3px 12px;font-size:9px;letter-spacing:2.5px;
  backdrop-filter:blur(8px);text-transform:uppercase}
#tod-chip{color:rgba(160,215,255,.9)}
#season-chip{color:rgba(255,220,100,.85)}

/* SPEED — top center */
#hud-speed{position:absolute;top:44px;left:50%;transform:translateX(-50%);
  z-index:200;pointer-events:none;text-align:center}
#hud-speed .val{font-family:'Russo One',sans-serif;font-size:34px;color:#f5c518;
  line-height:1;text-shadow:0 0 14px rgba(245,197,24,.55)}
#hud-speed .lbl{font-size:8px;color:rgba(245,197,24,.45);letter-spacing:3px}

/* KM + KILLS — shared stat style */
.stat-box{display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
.stat-icon{line-height:1}
.stat-num{font-family:'Russo One',sans-serif;font-size:18px;line-height:1}
.stat-lbl{font-size:7px;letter-spacing:2px;opacity:.55}

#hud-km{position:absolute;top:44px;left:14px;z-index:200}
#hud-km .stat-icon{font-size:22px}
#hud-km .stat-num{color:#78e878;text-shadow:0 0 8px rgba(80,220,80,.4)}
#hud-km .stat-lbl{color:rgba(80,220,80,.6)}

#kills{position:absolute;top:44px;right:14px;z-index:200}
#kills .stat-icon{font-size:22px;filter:drop-shadow(0 0 5px rgba(255,255,255,.5))}
#kills .stat-num{color:#fff;text-shadow:0 0 10px rgba(255,255,255,.5)}
#kills .stat-lbl{color:rgba(255,255,255,.5)}

/* MUSIC */
#pl{position:absolute;bottom:90px;right:12px;z-index:200;
  display:flex;flex-direction:column;align-items:flex-end;gap:5px}
#tn{background:rgba(6,6,16,.88);border:1px solid rgba(255,200,50,.2);
  border-radius:18px;padding:3px 11px;color:#f5c518;font-size:10px;
  max-width:148px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  backdrop-filter:blur(10px);opacity:0;transition:opacity .5s}
#tn.on{opacity:1}
.pbs{display:flex;gap:5px}
.pb{background:rgba(6,6,16,.88);border:1.5px solid rgba(255,200,50,.3);
  border-radius:50%;width:34px;height:34px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;color:#f5c518;font-size:13px;
  backdrop-filter:blur(10px);-webkit-tap-highlight-color:transparent;transition:transform .1s}
.pb:active{transform:scale(.86)}
#ub{background:rgba(6,6,16,.88);border:1.5px solid rgba(255,200,50,.26);
  border-radius:18px;padding:3px 10px;color:#f5c518;font-size:9px;
  letter-spacing:1px;cursor:pointer;backdrop-filter:blur(10px);
  -webkit-tap-highlight-color:transparent}
input[type=file]{display:none}

/* ADS */
#abu{position:absolute;bottom:90px;left:12px;z-index:200}
#abb{background:rgba(6,6,16,.88);border:1.5px solid rgba(255,200,50,.26);
  border-radius:18px;padding:3px 10px;color:#f5c518;font-size:9px;
  letter-spacing:1px;cursor:pointer;backdrop-filter:blur(10px);
  -webkit-tap-highlight-color:transparent}

/* BOTTOM CONTROLS */
#ctrl-bar{position:absolute;bottom:14px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:20px;z-index:200}

/* ── JOYSTICK PAD ──────────────────────────────── */
#ctrl-bar{position:absolute;bottom:12px;left:0;right:0;
  display:flex;align-items:flex-end;justify-content:center;gap:24px;z-index:200}

/* All direction buttons equal size */
.jbtn{
  background:rgba(6,6,16,.9);border:2px solid rgba(255,200,50,.42);
  border-radius:50%;width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;color:#f5c518;
  backdrop-filter:blur(10px);-webkit-tap-highlight-color:transparent;
  transition:background .08s,transform .08s;
  box-shadow:0 4px 16px rgba(0,0,0,.5);user-select:none}
.jbtn:active{background:rgba(245,197,24,.22);transform:scale(.91)}
.jbtn.dim{opacity:.22;pointer-events:none}

/* D-pad grid: up in row1 center, left/right in row2, down in row3 center */
#dpad{display:grid;grid-template-columns:52px 52px 52px;
  grid-template-rows:52px 52px 52px;gap:4px}
#dpad .jbtn.up  {grid-column:2;grid-row:1}
#dpad .jbtn.lft {grid-column:1;grid-row:2}
#dpad .jbtn.cnt {grid-column:2;grid-row:2;background:rgba(6,6,16,.7);
  border-style:none;box-shadow:none;cursor:default;pointer-events:none}
#dpad .jbtn.rgt {grid-column:3;grid-row:2}
#dpad .jbtn.dn  {grid-column:2;grid-row:3}

/* Horn button — same size as d-pad buttons, self-standing */
#horn-btn{
  background:rgba(20,16,4,.92);border:2px solid rgba(255,220,60,.35);
  border-radius:50%;width:52px;height:52px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(12px);
  -webkit-tap-highlight-color:transparent;
  transition:background .08s,border-color .1s,box-shadow .1s;
  box-shadow:0 4px 16px rgba(0,0,0,.5);align-self:center;gap:2px}
.horn-waves{display:flex;flex-direction:column;gap:2px;align-items:center}
.horn-wave{height:2px;border-radius:2px;background:rgba(255,220,60,0.45);transition:background .1s,width .1s}
.horn-wave:nth-child(1){width:18px}.horn-wave:nth-child(2){width:13px}.horn-wave:nth-child(3){width:8px}
#horn-btn:active .horn-wave,#horn-btn.flash .horn-wave{background:rgba(255,240,80,0.95)}
#horn-btn:active .horn-wave:nth-child(1),#horn-btn.flash .horn-wave:nth-child(1){width:22px}
#horn-btn:active .horn-wave:nth-child(2),#horn-btn.flash .horn-wave:nth-child(2){width:17px}
#horn-btn:active .horn-wave:nth-child(3),#horn-btn.flash .horn-wave:nth-child(3){width:11px}
#horn-btn:active,#horn-btn.flash{background:rgba(40,30,4,.9);
  border-color:rgba(255,235,60,.9);box-shadow:0 0 18px rgba(255,220,60,.45)}
.horn-icon{font-size:14px;line-height:1}
#horn-btn span.lbl{font-size:6px;letter-spacing:1px;color:rgba(255,220,60,.55)}
#horn-btn:active span.lbl,#horn-btn.flash span.lbl{color:rgba(255,240,80,.95)}

/* Install */
#ib{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
  background:rgba(6,6,16,.95);border:1px solid rgba(245,197,24,.4);
  border-radius:13px;padding:8px 16px;color:#f5c518;font-size:11px;
  z-index:300;display:none;backdrop-filter:blur(12px);
  cursor:pointer;letter-spacing:1px;white-space:nowrap}
#ib.show{display:block}

/* Flash overlay */
#flash{position:absolute;inset:0;background:rgba(255,80,0,0);
  pointer-events:none;z-index:90;transition:background .06s}
#flash.hit{background:rgba(255,80,0,.35)}
/* Horn flash effect */
#horn-flash{position:absolute;inset:0;pointer-events:none;z-index:31;
  background:rgba(255,240,100,0);transition:background .05s}
#horn-flash.on{background:rgba(255,240,100,.06)}
</style>
</head>
<body>
<div id="app">
  <canvas id="rc"></canvas>
  <canvas id="sc"></canvas>
  <canvas id="wc"></canvas>

  <div id="topbar">
    <div id="tod-chip" class="chip">УТРО</div>
    <div id="season-chip" class="chip">🌿 ЛЕТО</div>
  </div>

  <div id="hud-speed">
    <span class="val" id="spd">88</span>
    <span class="lbl">КМ/Ч</span>
  </div>

  <div id="hud-km" class="stat-box">
    <span class="stat-icon">🛣️</span>
    <span class="stat-num" id="kmv">0.0</span>
    <span class="stat-lbl">КМ</span>
  </div>

  <div id="kills" class="stat-box">
    <span class="stat-icon">💀</span>
    <span class="stat-num" id="kills-num">0</span>
    <span class="stat-lbl">СНЕСЕНО</span>
  </div>

  <div id="abu"><div id="abb">📋 РЕКЛАМА</div><input type="file" id="abf" accept="image/*" multiple></div>

  <div id="pl">
    <div id="tn">♪ нет треков</div>
    <div class="pbs">
      <div class="pb" id="pp">⏮</div>
      <div class="pb" id="py">▶</div>
      <div class="pb" id="pn">⏭</div>
    </div>
    <div id="ub">🎵 МУЗЫКА</div>
    <input type="file" id="fi" accept="audio/*" multiple>
  </div>

  <div id="ctrl-bar">
    <div id="horn-btn">
      <span class="horn-icon">📣</span>
      <div class="horn-waves">
        <div class="horn-wave"></div>
        <div class="horn-wave"></div>
        <div class="horn-wave"></div>
      </div>
      <span class="lbl">МОРГНУТЬ</span>
    </div>
    <div id="dpad">
      <div class="jbtn up"   id="accel">▲</div>
      <div class="jbtn lft"  id="lft">◀</div>
      <div class="jbtn cnt"></div>
      <div class="jbtn rgt"  id="rgt">▶</div>
      <div class="jbtn dn"   id="decel">▼</div>
    </div>
  </div>

  <div id="flash"></div>
  <div id="horn-flash"></div>
  <div id="ib">📲 Установить на рабочий стол</div>
</div>
<audio id="au" loop></audio>
<script>
// ═══ CANVAS ══════════════════════════════════════
const RC=document.getElementById('rc'),rx=RC.getContext('2d');
const SC=document.getElementById('sc'),sx=SC.getContext('2d');
const WC=document.getElementById('wc'),wx=WC.getContext('2d');
function rsz(){[RC,SC,WC].forEach(c=>{c.width=innerWidth;c.height=innerHeight;})}
rsz();addEventListener('resize',rsz);addEventListener('load',rsz);

// ═══ UTILS ═══════════════════════════════════════
const L=(a,b,t)=>a+(b-a)*t;
const C=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
function pc(s){const c=document.createElement('canvas');c.width=1;c.height=1;const x=c.getContext('2d');x.fillStyle=s;x.fillRect(0,0,1,1);const d=x.getImageData(0,0,1,1).data;return[d[0],d[1],d[2]];}
function lc(a,b,t){const p=pc(a),q=pc(b);return`rgb(${Math.round(p[0]+(q[0]-p[0])*t)},${Math.round(p[1]+(q[1]-p[1])*t)},${Math.round(p[2]+(q[2]-p[2])*t)})`;}
function hRGB(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}

// ═══ PERSPECTIVE ═════════════════════════════════
const HOR=()=>RC.height*0.42;
function rHW(z){return L(RC.width*0.52,RC.width*0.022,z);}
function rY(z){return L(RC.height*0.94,HOR(),z);}
function rX(frac,z){return RC.width/2+frac*rHW(z);}

// ═══ TOD ═════════════════════════════════════════
const TCYC=600;let GT=0;
const TD=[
  {n:'РАССВЕТ',sT:'#0a0520',sB:'#7b3f00',hG:'#ff6b35',su:'#ff8c00',am:.40,fg:[255,100,30,.12]},
  {n:'УТРО',   sT:'#1a6abf',sB:'#87ceeb',hG:'#ffd700',su:'#ffe066',am:.85,fg:[200,220,255,.06]},
  {n:'ПОЛДЕНЬ',sT:'#1565c0',sB:'#42a5f5',hG:'#e3f2fd',su:'#fff9c4',am:1.0,fg:[200,230,255,.03]},
  {n:'ВЕЧЕР',  sT:'#1a0a30',sB:'#7b1fa2',hG:'#ff5722',su:'#ff7043',am:.55,fg:[200,50,20,.10]},
  {n:'НОЧЬ',   sT:'#000010',sB:'#000830',hG:'#0a0a40',su:'#c0c0ff',am:.15,fg:[10,10,50,.18]},
];
function gtod(t){const ph=(t%TCYC)/TCYC,sg=ph*TD.length,i=Math.floor(sg)%TD.length,f=sg-Math.floor(sg);return{t:TD[i],n:TD[(i+1)%TD.length],f,ph};}

// ═══ SEASONS ═════════════════════════════════════
const SCYC=300;
const SN=[
  {n:'ВЕСНА', e:'🌸',gC:[[30,90,30],[15,55,15]],tC:[[80,160,80],[60,120,50]],rC:[44,44,44],snow:0},
  {n:'ЛЕТО',  e:'🌿',gC:[[20,75,20],[10,45,10]],tC:[[18,80,25],[14,60,18]],rC:[46,46,46],snow:0},
  {n:'ОСЕНЬ', e:'🍂',gC:[[80,70,20],[55,50,12]],tC:[[180,90,20],[150,70,10]],rC:[42,42,42],snow:0},
  {n:'ЗИМА',  e:'❄️',gC:[[200,215,230],[170,185,200]],tC:[[180,195,210],[160,175,195]],rC:[55,55,60],snow:1},
];
let seasonT=0;
function gSeason(t){const ph=(t%SCYC)/SCYC*4,si=Math.floor(ph)%4,sf=ph-Math.floor(ph);return{s:SN[si],nx:SN[(si+1)%4],sf};}

// ═══ STARS ═══════════════════════════════════════
const STARS=Array.from({length:120},()=>({x:Math.random(),y:Math.random()*.46,r:Math.random()*1.2+.3,tw:Math.random()*Math.PI*2}));

// ═══ GAME STATE ══════════════════════════════════
let RO=0,KM=0,SP=88,TSP=88,LT=null,killCount=0;
// Speed target override: player can nudge speed up/down
let speedBoost=0; // +1 accelerate, -1 brake, 0 normal

// Speed buttons
document.getElementById('accel').addEventListener('click',()=>{TSP=C(TSP+60,30,199);});
document.getElementById('decel').addEventListener('click',()=>{TSP=C(TSP-60,30,199);});

// ═══ HORN / FLASH ════════════════════════════════
let hornTimer=0;
const hornFlash=document.getElementById('horn-flash');
const hornBtn=document.getElementById('horn-btn');

function doHorn(){
  // Flash effect
  hornBtn.classList.add('flash');
  hornFlash.classList.add('on');
  hornTimer=0.25;
  // Scare nearest car into changing lane
  scareNearestCar();
}
hornBtn.addEventListener('click',doHorn);

function scareNearestCar(){
  // Only scare cars in OUR direction lanes (2=inner right, 3=outer right)
  const candidates=trf.filter(v=>
    !v.hit && !v.scared &&
    (v.lane===2||v.lane===3) &&  // same-direction lanes only
    v.z>0.08 && v.z<0.8          // visible range
  );
  if(!candidates.length)return;
  // Pick closest (lowest z = nearest)
  candidates.sort((a,b)=>a.z-b.z);
  const scared=candidates[0];

  // Swerve LEFT exactly one lane (always toward oncoming side)
  const newLane=scared.lane-1; // 2→1 or 3→2
  if(newLane<0)return;

  const oldLane=scared.lane;
  scared.lane=newLane;
  scared.scared=true; // mark so we don't scare it again
  // Swerve animation: smoothly move to new lane frac
  // We use swerveTarget to drive lane frac in drawVeh
  scared.swerveFrom=LANE_FRACS[oldLane];
  scared.swerveTarget=LANE_FRACS[newLane];
  scared.swerveT=0; // 0→1 interpolation progress

  // Immediately check if the new lane has a car nearby → chain collision
  trf.forEach(victim=>{
    if(victim===scared||victim.hit)return;
    if(victim.lane===newLane && Math.abs(victim.z-scared.z)<0.20){
      hitCar(victim, victim.lane<2?-1.5:1.5);
      // If crash involves oncoming (lane 0 or 1), scared car also crashes
      if(victim.onc||victim.lane<=1){
        hitCar(scared, scared.lane<2?-1.2:1.2);
      }
    }
  });
}

function hitCar(v, vx){
  if(v.hit)return;
  v.hit=true;v.hitTimer=0;
  v.hx=rX(LANE_FRACS[v.lane],v.z);
  v.hy=rY(v.z);
  v.hitVX=vx;
  killCount++;
  document.getElementById('kills-num').textContent=killCount;
  const fe=document.getElementById('flash');
  fe.classList.add('hit');
  clearTimeout(fe._t);
  fe._t=setTimeout(()=>fe.classList.remove('hit'),150);
}

// ═══ LANES ═══════════════════════════════════════
const LANE_FRACS=[-0.75,-0.25,0.25,0.75];
let playerLaneIdx=2;
let playerLaneFrac=LANE_FRACS[2];
let playerLaneTgt=LANE_FRACS[2];
let swayAngle=0,swayTgt=0;

const lftBtn=document.getElementById('lft');
const rgtBtn=document.getElementById('rgt');
function updLane(){
  document.getElementById('lft').classList.toggle('dim', playerLaneIdx<=0);
  document.getElementById('rgt').classList.toggle('dim', playerLaneIdx>=3);
}
function moveLeft(){
  if(playerLaneIdx<=0)return;
  playerLaneIdx--;playerLaneTgt=LANE_FRACS[playerLaneIdx];
  swayTgt=-0.16;setTimeout(()=>swayTgt=0,650);updLane();
}
function moveRight(){
  if(playerLaneIdx>=3)return;
  playerLaneIdx++;playerLaneTgt=LANE_FRACS[playerLaneIdx];
  swayTgt=0.16;setTimeout(()=>swayTgt=0,650);updLane();
}
lftBtn.addEventListener('click',moveLeft);
rgtBtn.addEventListener('click',moveRight);
updLane();

// Keyboard controls
addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){e.preventDefault();moveLeft();}
  else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){e.preventDefault();moveRight();}
  else if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){e.preventDefault();TSP=C(TSP+60,30,199);}
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){e.preventDefault();TSP=C(TSP-60,30,199);}
  else if(e.key===' '||e.key==='h'||e.key==='H'){e.preventDefault();doHorn();}
});

// ═══ OBJECTS ═════════════════════════════════════
// Sparser trees
let trees=[],tTmr=0;
const TREE_INT=8.4;  // 3× sparser trees
function spTree(side){trees.push({side,z:1,tp:Math.random()<.65?'p':'b',h:.7+Math.random()*.6});}

let bbImgs=[],bbs=[],bbTmr=0;
const BB_INT=14;
const BBT=['ВАШ БРЕНД','RUSH CONTROL','★ СКИДКИ ★'];
function spBB(){bbs.push({side:Math.random()<.5?'L':'R',z:1,ii:bbImgs.length>0?0:-1,tx:BBT[Math.floor(Math.random()*BBT.length)]});}

// ═══ TRAFFIC ═════════════════════════════════════
// More realistic car colors — less random, more real-world
const CAR_COLORS=[
  {body:'#c0392b',roof:'#a52d22',glass:'rgba(100,160,220,0.7)'},   // red
  {body:'#2c3e50',roof:'#1a2530',glass:'rgba(120,180,230,0.7)'},   // dark grey
  {body:'#ecf0f1',roof:'#bdc3c7',glass:'rgba(100,180,240,0.75)'},  // white
  {body:'#2980b9',roof:'#1a6090',glass:'rgba(140,200,255,0.7)'},   // blue
  {body:'#27ae60',roof:'#1e8449',glass:'rgba(100,200,160,0.65)'},  // green
  {body:'#f39c12',roof:'#d68910',glass:'rgba(200,200,100,0.6)'},   // orange
  {body:'#7f8c8d',roof:'#636e72',glass:'rgba(140,180,220,0.7)'},   // silver
  {body:'#1a1a2e',roof:'#0f0f1a',glass:'rgba(80,140,200,0.7)'},    // black
  {body:'#8e44ad',roof:'#76359d',glass:'rgba(160,120,220,0.65)'},  // purple
  {body:'#a04000',roof:'#854000',glass:'rgba(180,140,100,0.6)'},   // brown
];
const TRUCK_COLORS=[
  {body:'#2c3e50',cab:'#1a252f',stripe:'#e74c3c'},
  {body:'#f39c12',cab:'#2c3e50',stripe:'#ecf0f1'},
  {body:'#ecf0f1',cab:'#2c3e50',stripe:'#3498db'},
  {body:'#27ae60',cab:'#1e4d2b',stripe:'#f1c40f'},
];
let trf=[],trfTmr=0;
const TRF_INT=8.2;  // 2× more traffic than before
function spCar(){
  const onc=Math.random()<.42;
  const lane=onc?(Math.random()<.5?0:1):(Math.random()<.5?2:3);
  const tp=Math.random()<.16?'T':(Math.random()<.10?'M':'C');
  const ci=Math.floor(Math.random()*(tp==='T'?TRUCK_COLORS.length:CAR_COLORS.length));
  // Poputnye: strictly 50-80 km/h, vstrechnye: 80-120 km/h
  const kmh=onc?(80+Math.random()*40):(50+Math.random()*30);
  trf.push({onc,lane,tp,ci,kmh,
    z:0.97,  // always spawn at horizon
    hit:false,hitTimer:0,hitVX:0,hx:0,hy:0,spinAngle:0,
    wheelRot:Math.random()*Math.PI*2,
  });
}

// ═══ COLLISION ═══════════════════════════════════
const flashEl=document.getElementById('flash');
let flashTimer=0;
function checkCol(){
  const ourFrac=LANE_FRACS[playerLaneIdx];
  trf.forEach(v=>{
    if(v.hit||v.z<0.04||v.z>0.2)return;
    const laneDist=Math.abs(LANE_FRACS[v.lane]-ourFrac);
    const zDist=Math.abs(v.z-0.09);
    if(laneDist<0.3&&zDist<0.11){
      hitCar(v,(v.lane<2?-1:1)*(0.8+Math.random()*0.5));
    }
  });
}

// ═══ DRAW REALISTIC VEHICLE ══════════════════════
function drawVeh(v,am,hlights){
  if(!v.hit&&(v.z>1.02||v.z<0.01))return;
  const lW=rHW(v.z)*0.5;
  const al=L(.18,1,1-v.z)*L(.4,1,am);
  const nightBoost=hlights&&!v.onc?Math.min(1,al*1.4):al;

  let vx,vy;
  if(v.hit){vx=v.hx;vy=v.hy;}
  else{
    // Smooth precise lane interpolation using swerveT
    if(v.swerveT!==undefined && v.swerveT<1){
      v.swerveT=Math.min(1, v.swerveT+0.04); // ~25 frames to complete
      const eased=v.swerveT<0.5?2*v.swerveT*v.swerveT:1-Math.pow(-2*v.swerveT+2,2)/2;
      const curFrac=L(v.swerveFrom, v.swerveTarget, eased);
      vx=rX(curFrac, v.z);
    } else {
      vx=rX(LANE_FRACS[v.lane], v.z);
    }
    vy=rY(v.z);
  }

  v.wheelRot+=0.08*(v.onc?1:-1);

  rx.save();rx.translate(vx,vy);
  if(v.hit){v.spinAngle+=v.hitVX*0.12;rx.rotate(v.spinAngle);}
  rx.globalAlpha=nightBoost;

  if(v.tp==='C'){
    const col=CAR_COLORS[v.ci%CAR_COLORS.length];
    const w=lW*0.72,h=lW*0.42;

    // Car shadow
    rx.fillStyle='rgba(0,0,0,0.25)';
    rx.beginPath();rx.ellipse(0,h*0.08,w*0.48,h*0.1,0,0,Math.PI*2);rx.fill();

    // Body with gradient
    const bg=rx.createLinearGradient(-w/2,-h,w/2,0);
    bg.addColorStop(0,col.body);bg.addColorStop(.6,col.body);bg.addColorStop(1,'rgba(0,0,0,0.3)');
    rx.fillStyle=bg;rx.fillRect(-w/2,-h,w,h);

    // Roof
    const rg=rx.createLinearGradient(-w*.3,-h*1.48,w*.3,-h);
    rg.addColorStop(0,col.roof);rg.addColorStop(1,'rgba(0,0,0,0.4)');
    rx.fillStyle=rg;
    rx.beginPath();
    rx.moveTo(-w*.28,-h);rx.lineTo(-w*.25,-h*1.48);
    rx.lineTo(w*.25,-h*1.48);rx.lineTo(w*.28,-h);rx.closePath();rx.fill();

    // Windshield
    rx.fillStyle=col.glass;
    rx.beginPath();
    rx.moveTo(-w*.22,-h*1.02);rx.lineTo(-w*.2,-h*1.42);
    rx.lineTo(w*.2,-h*1.42);rx.lineTo(w*.22,-h*1.02);rx.closePath();rx.fill();

    // Rear window
    rx.fillStyle=col.glass.replace('0.7','0.5').replace('0.75','0.55');
    rx.fillRect(-w*.22,-h*.98,w*.44,h*.25);

    // Body crease line
    rx.strokeStyle='rgba(255,255,255,0.12)';rx.lineWidth=1;
    rx.beginPath();rx.moveTo(-w/2,-h*.5);rx.lineTo(w/2,-h*.5);rx.stroke();

    // Bumper
    rx.fillStyle='rgba(180,180,180,0.7)';
    rx.fillRect(-w*.42,-h*.04,w*.84,h*.06);

    // Realistic wheels with rims
    const wr=Math.max(2.5,lW*0.095);
    [{x:-w*.36,y:0},{x:w*.36,y:0},{x:-w*.36,y:-h*.82},{x:w*.36,y:-h*.82}].forEach(p=>{
      // Tyre
      rx.beginPath();rx.arc(p.x,p.y,wr,0,Math.PI*2);
      rx.fillStyle='#1a1a1a';rx.fill();
      rx.strokeStyle='#2a2a2a';rx.lineWidth=1;rx.stroke();
      // Rim
      rx.beginPath();rx.arc(p.x,p.y,wr*.62,0,Math.PI*2);
      rx.fillStyle='#c8c8c8';rx.fill();
      // Rim spokes
      rx.save();rx.translate(p.x,p.y);rx.rotate(v.wheelRot);
      for(let i=0;i<5;i++){
        const a=i*Math.PI*2/5;
        rx.strokeStyle='#888';rx.lineWidth=1.5;
        rx.beginPath();rx.moveTo(0,0);rx.lineTo(Math.cos(a)*wr*.55,Math.sin(a)*wr*.55);rx.stroke();
      }
      rx.restore();
      // Hub cap
      rx.beginPath();rx.arc(p.x,p.y,wr*.18,0,Math.PI*2);
      rx.fillStyle='#666';rx.fill();
    });

    // Headlights (front)
    if(v.onc){
      const hlCol=hlights?'rgba(255,255,200,0.95)':'rgba(255,255,180,0.7)';
      [-w*.3,w*.3].forEach(lx=>{
        rx.fillStyle=hlCol;rx.fillRect(lx-lW*.04,-h*.12,lW*.08,lW*.07);
        if(hlights){
          const hgl=rx.createRadialGradient(lx,-h*.08,0,lx,-h*.08,lW*.22);
          hgl.addColorStop(0,'rgba(255,255,200,0.45)');hgl.addColorStop(1,'transparent');
          rx.fillStyle=hgl;rx.beginPath();rx.arc(lx,-h*.08,lW*.22,0,Math.PI*2);rx.fill();
        }
      });
    } else {
      // Tail lights
      [-w*.32,w*.32].forEach(lx=>{
        rx.fillStyle='rgba(255,30,30,0.9)';rx.fillRect(lx-lW*.035,-h*.1,lW*.07,lW*.06);
        const tgl=rx.createRadialGradient(lx,-h*.07,0,lx,-h*.07,lW*.1);
        tgl.addColorStop(0,'rgba(255,40,40,0.35)');tgl.addColorStop(1,'transparent');
        rx.fillStyle=tgl;rx.beginPath();rx.arc(lx,-h*.07,lW*.1,0,Math.PI*2);rx.fill();
      });
    }

    // Snow on roof
    if(v.swerveAnim===undefined||true){
      const season=gSeason(seasonT);
      if(season.s.snow>0){
        rx.fillStyle=`rgba(230,240,255,${season.s.snow*al*.7})`;
        rx.fillRect(-w*.22,-h*1.48,w*.44,h*.06);
      }
    }

  }else if(v.tp==='T'){
    const col=TRUCK_COLORS[v.ci%TRUCK_COLORS.length];
    const w=lW*0.88,h=lW*0.58;
    const cW=w*0.3;
    const cabX=v.onc?-w/2+w*0.7:-w/2;

    // Shadow
    rx.fillStyle='rgba(0,0,0,0.22)';
    rx.beginPath();rx.ellipse(0,h*0.08,w*0.48,h*0.09,0,0,Math.PI*2);rx.fill();

    // Trailer
    const tg2=rx.createLinearGradient(-w/2,-h,w*.7-w/2,0);
    tg2.addColorStop(0,col.body);tg2.addColorStop(1,'rgba(0,0,0,0.25)');
    rx.fillStyle=tg2;rx.fillRect(-w/2,-h,w*0.7,h);
    // Stripe on trailer
    rx.fillStyle=col.stripe;rx.fillRect(-w/2,-h*.15,w*.7,h*.08);
    // Ribs
    for(let i=1;i<5;i++){rx.fillStyle='rgba(0,0,0,0.08)';rx.fillRect(-w/2,-h+h*i/5,w*.7,1.5);}
    rx.strokeStyle='rgba(0,0,0,0.4)';rx.lineWidth=1;rx.strokeRect(-w/2,-h,w*.7,h);

    // Cab
    const cg2=rx.createLinearGradient(cabX,-h*1.1,cabX+cW,0);
    cg2.addColorStop(0,col.cab);cg2.addColorStop(1,'rgba(0,0,0,0.4)');
    rx.fillStyle=cg2;rx.fillRect(cabX,-h*1.12,cW,h*1.12);
    rx.fillStyle=`rgba(100,180,240,0.7)`;rx.fillRect(cabX+cW*.08,-h*1.0,cW*.84,h*.42);
    // Cab stripe
    rx.fillStyle=col.stripe;rx.fillRect(cabX,-h*1.12,cW,h*.08);

    // Wheels
    const wr=Math.max(3,lW*0.115);
    [{x:-w*.36,y:0},{x:-w*.12,y:0},{x:w*.32,y:0}].forEach(p=>{
      rx.beginPath();rx.arc(p.x,p.y,wr,0,Math.PI*2);rx.fillStyle='#1a1a1a';rx.fill();
      rx.beginPath();rx.arc(p.x,p.y,wr*.58,0,Math.PI*2);rx.fillStyle='#aaa';rx.fill();
      rx.save();rx.translate(p.x,p.y);rx.rotate(v.wheelRot);
      for(let i=0;i<6;i++){const a=i*Math.PI/3;rx.strokeStyle='#777';rx.lineWidth=1.5;rx.beginPath();rx.moveTo(0,0);rx.lineTo(Math.cos(a)*wr*.5,Math.sin(a)*wr*.5);rx.stroke();}
      rx.restore();
      rx.beginPath();rx.arc(p.x,p.y,wr*.16,0,Math.PI*2);rx.fillStyle='#555';rx.fill();
    });

    // Lights
    if(v.onc){
      rx.fillStyle=hlights?'rgba(255,255,200,0.95)':'rgba(255,255,180,0.75)';
      rx.fillRect(cabX+cW*.7,-h*.18,cW*.22,lW*.09);
      if(hlights){
        const hgl=rx.createRadialGradient(cabX+cW*.85,-h*.14,0,cabX+cW*.85,-h*.14,lW*.28);
        hgl.addColorStop(0,'rgba(255,255,200,0.4)');hgl.addColorStop(1,'transparent');
        rx.fillStyle=hgl;rx.beginPath();rx.arc(cabX+cW*.85,-h*.14,lW*.28,0,Math.PI*2);rx.fill();
      }
    } else {
      rx.fillStyle='rgba(255,30,30,0.9)';rx.fillRect(-w/2,-h*.12,lW*.08,lW*.09);
    }

  }else{
    // Motorcycle — more detailed
    const col=CAR_COLORS[v.ci%CAR_COLORS.length];
    const w=lW*0.24,h=lW*0.38;
    const wr=Math.max(2,lW*0.078);

    // Shadow
    rx.fillStyle='rgba(0,0,0,0.2)';
    rx.beginPath();rx.ellipse(0,wr*0.2,w*0.9,wr*0.25,0,0,Math.PI*2);rx.fill();

    // Frame
    rx.fillStyle='rgba(40,40,40,0.9)';
    rx.beginPath();rx.moveTo(-w*.3,-h*.2);rx.lineTo(w*.3,-h*.2);rx.lineTo(w*.2,-h*.6);rx.lineTo(-w*.2,-h*.6);rx.closePath();rx.fill();

    // Body fairing
    rx.fillStyle=col.body;
    rx.beginPath();rx.ellipse(0,-h*.45,w*.38,h*.28,0,0,Math.PI*2);rx.fill();

    // Rider
    rx.fillStyle='#222';rx.fillRect(-w*.22,-h*.82,w*.44,h*.32);
    rx.beginPath();rx.arc(0,-h*.88,w*.3,0,Math.PI*2);rx.fillStyle='#333';rx.fill();
    // Helmet visor
    rx.fillStyle=col.glass;
    rx.beginPath();rx.arc(0,-h*.88,w*.22,Math.PI*.15,Math.PI*.85);rx.fill();

    // Exhaust
    rx.fillStyle='rgba(120,120,120,0.8)';rx.fillRect(-w*.38,-h*.25,w*.08,h*.2);

    // Wheels
    [-w*.38,w*.38].forEach(wx=>{
      rx.beginPath();rx.arc(wx,0,wr,0,Math.PI*2);rx.fillStyle='#111';rx.fill();
      rx.strokeStyle='#222';rx.lineWidth=1;rx.stroke();
      rx.beginPath();rx.arc(wx,0,wr*.55,0,Math.PI*2);rx.fillStyle='#aaa';rx.fill();
      rx.save();rx.translate(wx,0);rx.rotate(v.wheelRot*1.4);
      for(let i=0;i<5;i++){const a=i*Math.PI*2/5;rx.strokeStyle='#888';rx.lineWidth=1.2;rx.beginPath();rx.moveTo(0,0);rx.lineTo(Math.cos(a)*wr*.48,Math.sin(a)*wr*.48);rx.stroke();}
      rx.restore();
    });

    // Light
    rx.fillStyle=v.onc?`rgba(255,255,180,${hlights?.95:.75})`:'rgba(255,30,30,0.9)';
    rx.fillRect(v.onc?w*.28:-w*.28-lW*.04,-h*.28,lW*.05,lW*.04);
  }

  rx.globalAlpha=1;
  rx.restore();

  // Sparks on hit
  if(v.hit&&v.hitTimer<0.6){
    const n=Math.floor((0.6-v.hitTimer)*12);
    for(let i=0;i<n;i++){
      const px=vx+(Math.random()-.5)*rHW(v.z);
      const py=vy+(Math.random()-.5)*rHW(v.z)*0.4;
      rx.beginPath();rx.arc(px,py,Math.random()*3+1,0,Math.PI*2);
      const r=200+Math.floor(Math.random()*55);
      const g2=Math.floor(Math.random()*180);
      rx.fillStyle=`rgba(${r},${g2},0,${0.9-v.hitTimer})`;rx.fill();
    }
  }
}

// ═══ DRAW PLAYER RC TRUCK ════════════════════════
// Based on photo: wide monster truck, blue body, carbon fiber panel, big knobby tyres
let truckBounce=0, truckBounceDir=1;

function drawPlayerTruck(am,hlights){
  const W=RC.width,H=RC.height;
  const playerZ=0.085;
  const lW=rHW(playerZ)*0.5;
  const basX=rX(playerLaneFrac,playerZ)+swayAngle*W*0.012;
  const basY=rY(playerZ)+H*0.005;

  // Suspension bounce
  truckBounce+=0.18*truckBounceDir;
  if(Math.abs(truckBounce)>2.5)truckBounceDir*=-1;

  // Dimensions — 50% smaller: half of one lane width
  const TW=lW*0.50;   // total width
  const TH=lW*0.36;   // body height
  const BW=lW*0.29;   // body/cab width
  const WR=lW*0.14;   // wheel radius

  rx.save();
  rx.translate(basX, basY+truckBounce);

  // ── BIG SHADOW
  rx.fillStyle='rgba(0,0,0,0.4)';
  rx.beginPath();rx.ellipse(0,WR*0.15,TW*0.42,WR*0.22,0,0,Math.PI*2);rx.fill();

  // ── SUSPENSION ARMS (chassis visible under body)
  rx.strokeStyle='rgba(30,30,30,0.9)';rx.lineWidth=Math.max(2,lW*0.04);
  // rear axle rod
  rx.beginPath();rx.moveTo(-TW*0.38,-WR*0.1);rx.lineTo(TW*0.38,-WR*0.1);rx.stroke();
  // suspension links
  [[-1,1],[1,1],[-1,-1],[1,-1]].forEach(([sx2,sy2])=>{
    rx.beginPath();rx.moveTo(sx2*BW*0.38,-WR*0.1);rx.lineTo(sx2*TW*0.36,-WR*0.45+sy2*0.1);rx.stroke();
  });

  // ── SPRINGS (coilover shocks from photo)
  function drawSpring(x,y1,y2,col){
    rx.strokeStyle=col;rx.lineWidth=Math.max(1.5,lW*0.025);
    const coils=5,h2=y2-y1;
    rx.beginPath();rx.moveTo(x,y1);
    for(let i=0;i<=coils*2;i++){
      const t2=i/(coils*2);
      const offs=((i%2===0)?1:-1)*lW*0.06;
      rx.lineTo(x+offs,y1+t2*h2);
    }
    rx.stroke();
    // Shock body
    rx.strokeStyle='rgba(80,80,80,0.8)';rx.lineWidth=Math.max(1,lW*0.018);
    rx.beginPath();rx.moveTo(x,y1+h2*.3);rx.lineTo(x,y2);rx.stroke();
  }
  const springY1=-WR*1.1+TH*0.1, springY2=-WR*0.5;
  drawSpring(-BW*0.3,springY1,springY2,'rgba(200,100,20,0.85)');
  drawSpring( BW*0.3,springY1,springY2,'rgba(200,100,20,0.85)');

  // ── BODY — blue RC truck body from photo
  // Main lower body
  const bodyGrad=rx.createLinearGradient(-BW/2,-TH,BW/2,0);
  bodyGrad.addColorStop(0,'#1a4a8a');bodyGrad.addColorStop(.4,'#1e5aaa');bodyGrad.addColorStop(1,'#0a2a5a');
  rx.fillStyle=bodyGrad;
  rx.beginPath();
  rx.moveTo(-BW/2,-TH*0.1);
  rx.lineTo(-BW*0.55,-TH*0.6);
  rx.lineTo(-BW*0.4,-TH*1.05);
  rx.lineTo(BW*0.4,-TH*1.05);
  rx.lineTo(BW*0.55,-TH*0.6);
  rx.lineTo(BW/2,-TH*0.1);
  rx.closePath();rx.fill();

  // Carbon fiber center panel (from photo)
  const cfGrad=rx.createLinearGradient(-BW*.22,-TH*.95,BW*.22,-TH*.15);
  cfGrad.addColorStop(0,'#1a1a1a');cfGrad.addColorStop(.5,'#2a2a2a');cfGrad.addColorStop(1,'#111');
  rx.fillStyle=cfGrad;
  rx.fillRect(-BW*0.22,-TH*0.95,BW*0.44,TH*0.8);
  // Carbon fiber texture
  const cfSize=Math.max(3,lW*0.06);
  rx.save();rx.beginPath();rx.rect(-BW*0.22,-TH*0.95,BW*0.44,TH*0.8);rx.clip();
  for(let ci=0;ci<6;ci++) for(let cj=0;cj<6;cj++){
    rx.fillStyle=ci%2===cj%2?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.08)';
    rx.fillRect(-BW*0.22+ci*cfSize,-TH*0.95+cj*cfSize,cfSize,cfSize);
  }
  rx.restore();

  // Green/yellow accent stripes (from photo)
  rx.strokeStyle='rgba(0,220,100,0.85)';rx.lineWidth=Math.max(2,lW*0.04);
  rx.beginPath();rx.moveTo(-BW*0.5,-TH*0.7);rx.lineTo(-BW*0.22,-TH*0.7);rx.stroke();
  rx.beginPath();rx.moveTo(BW*0.22,-TH*0.7);rx.lineTo(BW*0.5,-TH*0.7);rx.stroke();

  // Roof / top plate
  const roofGrad=rx.createLinearGradient(-BW*.35,-TH*1.05,BW*.35,-TH*.85);
  roofGrad.addColorStop(0,'#1a5aaa');roofGrad.addColorStop(1,'#0a3a8a');
  rx.fillStyle=roofGrad;
  rx.beginPath();rx.moveTo(-BW*.4,-TH*1.05);rx.lineTo(BW*.4,-TH*1.05);rx.lineTo(BW*.3,-TH*1.22);rx.lineTo(-BW*.3,-TH*1.22);rx.closePath();rx.fill();

  // Rear wing spoiler (from photo)
  rx.fillStyle='rgba(20,20,20,0.9)';
  rx.fillRect(-BW*.45,-TH*1.26,BW*.9,lW*0.04);
  // Wing endplates
  [-BW*.45,BW*.45-lW*.04].forEach(wx2=>{rx.fillRect(wx2,-TH*1.26,lW*.04,lW*.08);});

  // Tail lights (red, rectangular from photo)
  [[-BW*.28,-TH*.35],[BW*.28-lW*.12,-TH*.35]].forEach(([lx,ly])=>{
    rx.fillStyle='rgba(255,30,30,0.9)';rx.fillRect(lx,ly,lW*.12,lW*.08);
    const tlg=rx.createRadialGradient(lx+lW*.06,ly+lW*.04,0,lx+lW*.06,ly+lW*.04,lW*.15);
    tlg.addColorStop(0,'rgba(255,50,50,0.5)');tlg.addColorStop(1,'transparent');
    rx.fillStyle=tlg;rx.beginPath();rx.arc(lx+lW*.06,ly+lW*.04,lW*.15,0,Math.PI*2);rx.fill();
  });

  // Headlight flash effect (when horning)
  if(hlights){
    [[-BW*.28,-TH*.8],[BW*.16,-TH*.8]].forEach(([lx,ly])=>{
      const hgl=rx.createRadialGradient(lx,ly,0,lx,ly,lW*.35);
      hgl.addColorStop(0,'rgba(255,255,200,0.6)');hgl.addColorStop(1,'transparent');
      rx.fillStyle=hgl;rx.beginPath();rx.arc(lx,ly,lW*.35,0,Math.PI*2);rx.fill();
      rx.fillStyle='rgba(255,255,200,0.9)';rx.fillRect(lx-lW*.06,ly-lW*.05,lW*.12,lW*.08);
    });
  }

  // ── MONSTER WHEELS (4 corners) — huge knobby tyres from photo
  const wheelPos=[
    {x:-TW*0.38,y:-WR*0.05},   // rear left
    {x: TW*0.38,y:-WR*0.05},   // rear right
    {x:-TW*0.38,y:-TH*0.85},   // front left
    {x: TW*0.38,y:-TH*0.85},   // front right
  ];
  const globalWheelRot=(GT*8)%(Math.PI*2);

  wheelPos.forEach((wp,wi)=>{
    const isRight=wi%2===1;
    rx.save();rx.translate(wp.x,wp.y);

    // Tyre outer
    rx.beginPath();rx.arc(0,0,WR,0,Math.PI*2);
    const tyreGrad=rx.createRadialGradient(-WR*.2,-WR*.2,WR*.1,0,0,WR);
    tyreGrad.addColorStop(0,'#2a2a2a');tyreGrad.addColorStop(.7,'#111');tyreGrad.addColorStop(1,'#0a0a0a');
    rx.fillStyle=tyreGrad;rx.fill();
    rx.strokeStyle='#1a1a1a';rx.lineWidth=1.5;rx.stroke();

    // Knobby tread pattern (from photo — big rectangular knobs)
    rx.save();rx.rotate(globalWheelRot*(isRight?1:-1));
    const knobCount=12;
    for(let k=0;k<knobCount;k++){
      const ka=k*Math.PI*2/knobCount;
      const kr=WR*0.82;
      const kw=WR*0.18,kh=WR*0.15;
      rx.save();rx.rotate(ka);rx.translate(0,-kr);
      rx.fillStyle='rgba(50,50,50,0.95)';
      rx.fillRect(-kw/2,-kh/2,kw,kh);
      rx.strokeStyle='rgba(70,70,70,0.5)';rx.lineWidth=0.5;rx.strokeRect(-kw/2,-kh/2,kw,kh);
      rx.restore();
    }
    rx.restore();

    // White lettering ring on tyre
    rx.beginPath();rx.arc(0,0,WR*0.68,0,Math.PI*2);
    rx.strokeStyle='rgba(200,200,200,0.12)';rx.lineWidth=WR*0.06;rx.stroke();

    // Rim — chrome/silver from photo
    rx.beginPath();rx.arc(0,0,WR*0.55,0,Math.PI*2);
    const rimGrad=rx.createRadialGradient(-WR*.15,-WR*.15,0,0,0,WR*.55);
    rimGrad.addColorStop(0,'#e0e0e0');rimGrad.addColorStop(.5,'#aaaaaa');rimGrad.addColorStop(1,'#666');
    rx.fillStyle=rimGrad;rx.fill();

    // Rim spokes (5 from photo)
    rx.save();rx.rotate(globalWheelRot*(isRight?1:-1)*0.8);
    for(let s=0;s<5;s++){
      const sa=s*Math.PI*2/5;
      rx.fillStyle='rgba(100,100,100,0.9)';
      rx.beginPath();
      rx.moveTo(Math.cos(sa)*WR*.12,Math.sin(sa)*WR*.12);
      rx.lineTo(Math.cos(sa-0.2)*WR*.52,Math.sin(sa-0.2)*WR*.52);
      rx.lineTo(Math.cos(sa+0.2)*WR*.52,Math.sin(sa+0.2)*WR*.52);
      rx.closePath();rx.fill();
    }
    rx.restore();

    // Center hub
    rx.beginPath();rx.arc(0,0,WR*0.15,0,Math.PI*2);
    rx.fillStyle='#333';rx.fill();
    rx.beginPath();rx.arc(0,0,WR*0.08,0,Math.PI*2);
    rx.fillStyle='rgba(0,150,255,0.8)';rx.fill(); // blue center dot

    rx.restore();
  });

  rx.restore();

  // Headlight beam on road surface
  if(hlights){
    const beamGrad=rx.createRadialGradient(basX,basY-TH*0.5,0,basX,basY+H*0.06,H*0.18);
    beamGrad.addColorStop(0,'rgba(220,230,255,0.18)');beamGrad.addColorStop(1,'transparent');
    rx.fillStyle=beamGrad;
    rx.beginPath();rx.ellipse(basX,basY+H*0.04,W*0.22,H*0.14,0,0,Math.PI*2);rx.fill();
  }
}

function dSky(t,n,f,ph){

  rx.fillStyle=g;rx.fillRect(0,0,W,hor);
  const hc=pc(lc(t.hG,n.hG,f));
  const hg=rx.createLinearGradient(0,hor-50,0,hor+8);
  hg.addColorStop(0,'transparent');hg.addColorStop(.5,`rgba(${hc[0]},${hc[1]},${hc[2]},.22)`);hg.addColorStop(1,'transparent');
  rx.fillStyle=hg;rx.fillRect(0,hor-50,W,58);
  const na=(ph>.75||ph<.08)?1:(ph>.65?(ph-.65)/.1:Math.max(0,.15-(ph-.08)/.15));
  if(na>0)STARS.forEach(s=>{s.tw+=.02;const a=na*(.5+.5*Math.sin(s.tw));rx.beginPath();rx.arc(s.x*W,s.y*hor,s.r*.75,0,Math.PI*2);rx.fillStyle=`rgba(220,230,255,${Math.min(1,a)})`;rx.fill();});
  const sunx=W*(.5+.35*Math.cos(ph*Math.PI*2)),suny=hor*(.1+.62*Math.abs(Math.sin(ph*Math.PI)));
  if(ph>.10&&ph<.70){

    rx.fillStyle=sg;rx.fillRect(sunx-55,suny-55,110,110);
    rx.beginPath();rx.arc(sunx,suny,13,0,Math.PI*2);rx.fillStyle=lc(t.su,n.su,f);rx.fill();
  }else{
    rx.beginPath();rx.arc(sunx,suny,10,0,Math.PI*2);rx.fillStyle='#e8e8d0';rx.fill();
    rx.beginPath();rx.arc(sunx+4,suny-3,7.5,0,Math.PI*2);rx.fillStyle=lc(t.sT,n.sT,f);rx.fill();
  }
}

// ═══ BIPLANE ═════════════════════════════════════
// Once per game-day (~200s), when daytime (am>0.6), a biplane flies across
let biplaneX = -999;  // off-screen
let biplaneY = 0;
let biplaneActive = false;
let biplaneTimer = 40 + Math.random()*60; // first appearance delay
const BIPLANE_BANNER = 'Rush Control';

function updateBiplane(dt, am){
  if(biplaneActive){
    biplaneX += dt * RC.width * 0.22; // fly right
    if(biplaneX > RC.width + 300) {
      biplaneActive = false;
      biplaneTimer = 150 + Math.random()*80; // next day
    }
  } else {
    if(am > 0.6){ // only in daytime
      biplaneTimer -= dt;
      if(biplaneTimer <= 0){
        biplaneActive = true;
        biplaneX = -220;
        biplaneY = HOR() * (0.12 + Math.random()*0.22);
      }
    }
  }
}

function dBiplane(){
  if(!biplaneActive) return;
  const W=RC.width, H=RC.height;
  const x=biplaneX, y=biplaneY;
  const sc=1.4; // scale ×2

  rx.save();
  rx.translate(x, y);

  // ── FUSELAGE
  rx.fillStyle='#c8d8e8';
  rx.beginPath();
  rx.ellipse(0, 0, 38*sc, 9*sc, 0, 0, Math.PI*2);
  rx.fill();
  rx.strokeStyle='#8aa0b8';rx.lineWidth=1;rx.stroke();

  // ── NOSE CONE
  rx.fillStyle='#aabccc';
  rx.beginPath();rx.moveTo(38*sc,0);rx.lineTo(28*sc,-5*sc);rx.lineTo(28*sc,5*sc);rx.closePath();rx.fill();

  // ── TAIL FIN (vertical)
  rx.fillStyle='#b0c4d8';
  rx.beginPath();rx.moveTo(-32*sc,0);rx.lineTo(-42*sc,-16*sc);rx.lineTo(-28*sc,-2*sc);rx.closePath();rx.fill();
  // horizontal stabilisers
  rx.fillStyle='#b8ccd8';
  rx.beginPath();rx.moveTo(-30*sc,-3*sc);rx.lineTo(-44*sc,-8*sc);rx.lineTo(-44*sc,-2*sc);rx.lineTo(-30*sc,2*sc);rx.closePath();rx.fill();
  rx.beginPath();rx.moveTo(-30*sc,-3*sc);rx.lineTo(-44*sc,2*sc);rx.lineTo(-44*sc,7*sc);rx.lineTo(-30*sc,3*sc);rx.closePath();rx.fill();

  // ── UPPER WING
  rx.fillStyle='rgba(180,210,240,0.95)';
  rx.strokeStyle='#8aa0b8';rx.lineWidth=1;
  rx.beginPath();rx.moveTo(-10*sc,-9*sc);rx.lineTo(22*sc,-9*sc);rx.lineTo(26*sc,-18*sc);rx.lineTo(-18*sc,-18*sc);rx.closePath();rx.fill();rx.stroke();

  // ── LOWER WING
  rx.beginPath();rx.moveTo(-8*sc,9*sc);rx.lineTo(20*sc,9*sc);rx.lineTo(24*sc,18*sc);rx.lineTo(-16*sc,18*sc);rx.closePath();rx.fill();rx.stroke();

  // ── WING STRUTS (wires between wings)
  rx.strokeStyle='rgba(100,130,160,0.7)';rx.lineWidth=1;
  [[-2*sc,-16*sc,-1*sc,16*sc],[12*sc,-16*sc,10*sc,16*sc]].forEach(([x1,y1,x2,y2])=>{
    rx.beginPath();rx.moveTo(x1,y1);rx.lineTo(x2,y2);rx.stroke();
  });

  // ── PROPELLER (spinning)
  const propAngle=(GT*12)%(Math.PI*2);
  rx.save();rx.translate(38*sc,0);rx.rotate(propAngle);
  rx.strokeStyle='rgba(60,60,60,0.8)';rx.lineWidth=3*sc;rx.lineCap='round';
  rx.beginPath();rx.moveTo(0,-14*sc);rx.lineTo(0,14*sc);rx.stroke();
  rx.beginPath();rx.moveTo(-4*sc,-10*sc);rx.lineTo(4*sc,10*sc);rx.stroke();
  rx.restore();

  // ── COCKPIT
  rx.fillStyle='rgba(100,180,240,0.7)';
  rx.beginPath();rx.ellipse(8*sc,-6*sc,7*sc,5*sc,0,0,Math.PI*2);rx.fill();

  // ── PILOT HEAD
  rx.fillStyle='#f0d0a0';
  rx.beginPath();rx.arc(10*sc,-10*sc,4*sc,0,Math.PI*2);rx.fill();
  rx.fillStyle='#4a3a2a';
  rx.beginPath();rx.arc(10*sc,-12*sc,3.5*sc,Math.PI,0);rx.fill(); // goggles/helmet

  // ── BANNER rope
  const ropeLen=180*sc;
  rx.strokeStyle='rgba(80,60,40,0.7)';rx.lineWidth=1.5;
  rx.beginPath();rx.moveTo(-42*sc,4*sc);rx.lineTo(-42*sc-ropeLen,4*sc);rx.stroke();

  // ── BANNER
  const bx=-42*sc-ropeLen-160*sc;
  const bw=155*sc, bh=28*sc;
  // Banner wave effect
  rx.save();
  rx.translate(bx, 0);
  // Wavy banner shape
  const wave=Math.sin(GT*3)*3*sc;
  rx.fillStyle='rgba(255,250,220,0.95)';
  rx.strokeStyle='rgba(180,160,100,0.6)';rx.lineWidth=1;
  rx.beginPath();
  rx.moveTo(0,-bh/2);
  rx.lineTo(bw,-bh/2+wave);
  rx.lineTo(bw,bh/2+wave);
  rx.lineTo(0,bh/2);
  rx.closePath();rx.fill();rx.stroke();
  // Banner text
  rx.fillStyle='rgba(20,40,100,0.92)';
  rx.font=`bold ${14*sc}px 'Russo One',sans-serif`;
  rx.textAlign='center';rx.textBaseline='middle';
  rx.fillText(BIPLANE_BANNER, bw/2, wave/2);
  rx.restore();

  rx.restore();
}

function dGnd(am,season){
  const W=RC.width,H=RC.height,hor=HOR(),g=L(.2,1,am);
  const gc=season.s.gC,gnc=season.nx.gC,sf=season.sf;
  const r0=Math.round(L(gc[0][0],gnc[0][0],sf)*g),g0=Math.round(L(gc[0][1],gnc[0][1],sf)*g),b0=Math.round(L(gc[0][2],gnc[0][2],sf)*g);
  const r1=Math.round(L(gc[1][0],gnc[1][0],sf)*g),g1=Math.round(L(gc[1][1],gnc[1][1],sf)*g),b1=Math.round(L(gc[1][2],gnc[1][2],sf)*g);
  const gg=rx.createLinearGradient(0,hor,0,H);
  gg.addColorStop(0,`rgb(${r0},${g0},${b0})`);gg.addColorStop(1,`rgb(${r1},${g1},${b1})`);
  rx.fillStyle=gg;rx.fillRect(0,hor,W,H-hor);
}

function dRoad(am,fg,season){
  const W=RC.width,H=RC.height,hor=HOR();
  const al=L(.25,1,am);
  const rc=season.s.rC;
  const zNear=0.02,zFar=0.98;
  const roadBot=rY(zNear),roadTop=rY(zFar);

  rx.fillStyle=`rgba(${Math.round(rc[0]*al)},${Math.round(rc[1]*al)},${Math.round(rc[2]*al)},1)`;
  rx.beginPath();
  rx.moveTo(rX(-1,zNear),roadBot);rx.lineTo(rX(-1,zFar),roadTop);
  rx.lineTo(rX(1,zFar),roadTop);rx.lineTo(rX(1,zNear),roadBot);rx.closePath();rx.fill();

  rx.strokeStyle=`rgba(240,235,195,${.45*al})`;rx.lineWidth=2.5;
  rx.beginPath();rx.moveTo(rX(-1,zNear),roadBot);rx.lineTo(rX(-1,zFar),roadTop);rx.stroke();
  rx.beginPath();rx.moveTo(rX(1,zNear),roadBot);rx.lineTo(rX(1,zFar),roadTop);rx.stroke();

  rx.strokeStyle=`rgba(255,255,255,${.7*al})`;rx.lineWidth=2.2;
  rx.beginPath();rx.moveTo(rX(-.03,zNear),roadBot);rx.lineTo(rX(-.03,zFar),roadTop);rx.stroke();
  rx.beginPath();rx.moveTo(rX(.03,zNear),roadBot);rx.lineTo(rX(.03,zFar),roadTop);rx.stroke();

  [-.5,.5].forEach(lf=>{
    const vis=lf>0?1:.5;
    for(let i=0;i<20;i++){
      // base goes 0→1 as RO grows; invert so dashes flow FROM horizon TOWARD camera
      const base=1-((i/20)+RO*0.0025)%1;
      const z0=L(zNear,zFar,base);
      const z1=L(zNear,zFar,Math.min(base+0.022,0.98));
      if(z0>=z1||z0<zNear)continue;
      const t0=1-z0;
      rx.strokeStyle=`rgba(245,197,24,${t0*0.88*al*vis})`;rx.lineWidth=t0*4.2;
      rx.beginPath();rx.moveTo(rX(lf,z0),rY(z0));rx.lineTo(rX(lf,z1),rY(z1));rx.stroke();
    }
  });

  const ff=rx.createLinearGradient(0,roadTop-6,0,roadTop+30);
  ff.addColorStop(0,`rgba(${fg[0]},${fg[1]},${fg[2]},${fg[3]*1.8})`);ff.addColorStop(1,'transparent');
  rx.fillStyle=ff;rx.fillRect(0,roadTop-6,W,36);
}

function dTree(t,am,season){
  if(t.z<.03||t.z>1.0)return;
  const sc=1-t.z,groundY=rY(t.z);
  if(groundY<HOR())return;
  const edgeX=rX(t.side==='left'?-1:1,t.z);
  const pad=sc*RC.width*0.032;
  const x=t.side==='left'?edgeX-pad:edgeX+pad;
  const tH=RC.height*0.50*sc*t.h;
  const al=L(.15,1,sc)*L(.3,1,am);
  const tc=season.s.tC,tnc=season.nx.tC,sf=season.sf;
  const tr=Math.round(L(tc[0][0],tnc[0][0],sf)*al);
  const tg2=Math.round(L(tc[0][1],tnc[0][1],sf)*al);
  const tb=Math.round(L(tc[0][2],tnc[0][2],sf)*al);
  if(t.tp==='p'){
    rx.fillStyle=`rgba(${tr},${tg2},${tb},1)`;
    rx.beginPath();rx.moveTo(x,groundY-tH);rx.lineTo(x-tH*.31,groundY);rx.lineTo(x+tH*.31,groundY);rx.closePath();rx.fill();
    rx.fillStyle=`rgba(${Math.round(tr*.75)},${Math.round(tg2*1.15)},${Math.round(tb*.75)},.55)`;
    rx.beginPath();rx.moveTo(x,groundY-tH*.52);rx.lineTo(x-tH*.25,groundY-tH*.14);rx.lineTo(x+tH*.25,groundY-tH*.14);rx.closePath();rx.fill();
    if(season.s.snow>0){rx.fillStyle=`rgba(220,235,255,${season.s.snow*al*.9})`;rx.beginPath();rx.moveTo(x,groundY-tH);rx.lineTo(x-tH*.12,groundY-tH*.6);rx.lineTo(x+tH*.12,groundY-tH*.6);rx.closePath();rx.fill();}
    rx.fillStyle=`rgba(${Math.round(55*al)},${Math.round(30*al)},${Math.round(10*al)},1)`;
    rx.fillRect(x-tH*.038,groundY,tH*.076,tH*.13);
  }else{
    rx.fillStyle=`rgba(${tr},${tg2},${tb},.9)`;
    rx.beginPath();rx.ellipse(x,groundY-tH*.57,tH*.25,tH*.48,0,0,Math.PI*2);rx.fill();
    rx.strokeStyle=`rgba(${Math.round(190*al)},${Math.round(170*al)},${Math.round(140*al)},1)`;
    rx.lineWidth=Math.max(1.5,sc*RC.width*0.005);
    rx.beginPath();rx.moveTo(x,groundY);rx.lineTo(x,groundY-tH*.18);rx.stroke();
  }
}

function dBB(b,am){
  if(b.z<.03||b.z>1.0)return;
  const sc=1-b.z,groundY=rY(b.z);
  const edgeX=rX(b.side==='L'?-1:1,b.z);
  const pad=sc*RC.width*0.11;
  const x=b.side==='L'?edgeX-pad:edgeX+pad;
  const al=L(.07,1,sc);
  const bW=RC.width*0.22*sc,bH=RC.height*0.13*sc,pH=RC.height*0.09*sc;
  rx.fillStyle=`rgba(55,42,24,${al})`;rx.fillRect(x-bW*.025,groundY-pH-bH,bW*.05,pH+bH);
  const bx=x-bW/2,by=groundY-pH-bH;
  rx.fillStyle=`rgba(8,8,18,${al*.95})`;rx.fillRect(bx,by,bW,bH);
  rx.strokeStyle=`rgba(245,197,24,${al*.7})`;rx.lineWidth=1.5;rx.strokeRect(bx,by,bW,bH);
  if(b.ii>=0&&bbImgs[b.ii]){
    try{rx.save();rx.beginPath();rx.rect(bx+2,by+2,bW-4,bH-4);rx.clip();rx.globalAlpha=al;rx.drawImage(bbImgs[b.ii],bx+2,by+2,bW-4,bH-4);rx.globalAlpha=1;rx.restore();}
    catch(e){dBBtxt(b,bx,by,bW,bH,al);}
  }else dBBtxt(b,bx,by,bW,bH,al);
}
function dBBtxt(b,bx,by,bW,bH,al){
  rx.fillStyle=`rgba(245,197,24,${al})`;rx.font=`bold ${Math.max(6,bH*.3)}px 'Russo One',sans-serif`;
  rx.textAlign='center';rx.textBaseline='middle';rx.fillText(b.tx,bx+bW/2,by+bH/2);
}

let RD=[];

let snowF=[];
function initSnow(){snowF=Array.from({length:130},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:1+Math.random()*2.6,sp:.5+Math.random()*1.3,sw:Math.random()*Math.PI*2,al:.4+Math.random()*.5}));}
function dSnow(dt,pct){
  sx.clearRect(0,0,SC.width,SC.height);if(pct<=0)return;
  snowF.forEach(s=>{s.y+=s.sp*dt*60*.6;s.sw+=dt*1.5;s.x+=Math.sin(s.sw)*.5;if(s.y>SC.height){s.y=-s.r;s.x=Math.random()*SC.width;}
    sx.beginPath();sx.arc(s.x,s.y,s.r,0,Math.PI*2);sx.fillStyle=`rgba(220,235,255,${s.al*pct})`;sx.fill();});

let WX='clear',WXT=55+Math.random()*65;

// ═══ MAIN LOOP ═══════════════════════════════════
function loop(ts){
  if(!LT)LT=ts;
  const dt=Math.min((ts-LT)/1000,.05);LT=ts;
  GT+=dt*3;KM+=(SP/3600)*dt;
  // Player speed: smoothly approach target, range 30-199
  SP+=(TSP-SP)*.025;
  SP=C(SP,30,199);
  RO+=dt*SP*2.5;seasonT+=dt;

  playerLaneFrac+=(playerLaneTgt-playerLaneFrac)*dt*3.2;
  swayAngle+=(swayTgt-swayAngle)*dt*5;

  // Horn flash timer
  if(hornTimer>0){
    hornTimer-=dt;
    if(hornTimer<=0){hornBtn.classList.remove('flash');hornFlash.classList.remove('on');}
  }

  // Spawn objects — sparser trees
  bbTmr+=dt;if(bbTmr>=BB_INT){bbTmr=0;spBB();}
  tTmr+=dt;if(tTmr>TREE_INT){tTmr=0;spTree('left');spTree('right');} // one per side, not bunches
  trfTmr+=dt;if(trfTmr>=TRF_INT){trfTmr=0;spCar();}

  // Move — road scrolls at player speed, objects at their own absolute speeds
  // Perspective z-scale: objects near camera (z≈0) move fast, far (z≈1) slow
  const pScale = (z) => 0.05 + (1-z)*0.95;
  const spd = SP/3600; // player speed in units/sec base

  // Road scroll for static objects (trees, billboards) = player speed
  const os = dt * spd * 2.75;
  bbs.forEach(b=>{b.z -= os*pScale(b.z);});bbs=bbs.filter(b=>b.z>0);
  trees.forEach(t=>{t.z -= os*pScale(t.z);});trees=trees.filter(t=>t.z>0);

  trf.forEach(v=>{
    if(v.hit){
      v.hitTimer+=dt;
      v.hx+=v.hitVX*dt*RC.width*.65;
      v.hy+=dt*RC.height*.5;
      v.z-=dt*.04;
    } else {
      // Vehicle moves at absolute speed v.kmh regardless of player
      // From player's perspective, relative speed = SP±v.kmh
      // But we render in player's reference frame:
      // same dir: player gains (SP-kmh) on vehicle → positive = vehicle moves back
      // oncoming: closing speed = SP+kmh
      const carSpd = v.kmh/3600;
      const relSpd = v.onc ? (spd + carSpd) : (spd - carSpd);
      const dz = dt * relSpd * 2.75;
      v.z -= dz * pScale(v.z);
    }
  });
  trf=trf.filter(v=>v.z>-.3&&v.z<1.05&&(!v.hit||v.hitTimer<1.5));

  checkCol();

  WXT-=dt;
  if(WXT<=0){
    WXT=40+Math.random()*90;WX=WX==='clear'?'rain':'clear';
    if(WX==='rain')initRain();
    WC.classList.toggle('on',WX==='rain');
  }

  const{t,n,f,ph}=gtod(GT);
  const am=L(t.am,n.am,f);
  const season=gSeason(seasonT);

  document.getElementById('tod-chip').textContent=t.n;
  document.getElementById('season-chip').textContent=`${season.s.e} ${season.s.n}`;
  if(season.s.snow>0&&snowF.length===0)initSnow();

  rx.clearRect(0,0,RC.width,RC.height);
  dSky(t,n,f,ph);
  updateBiplane(dt, am);
  dBiplane();
  dGnd(am,season);
  dRoad(am,[...t.fg],season);

  const all=[
    ...trees.map(o=>({...o,_k:'tree'})),
    ...bbs.map(o=>({...o,_k:'bb'})),
    ...trf.map(o=>({...o,_k:'car'})),
  ].sort((a,b)=>b.z-a.z);
  all.forEach(o=>{
    if(o._k==='tree')dTree(o,am,season);
    else if(o._k==='bb')dBB(o,am);
    else drawVeh(o,am,false);
  });

  drawPlayerTruck(am,false);

  if(WX==='rain')dRain(dt);
  dSnow(dt,L(season.s.snow,season.nx.snow,season.sf));

  document.getElementById('spd').textContent=Math.round(SP);
  document.getElementById('kmv').textContent=KM.toFixed(1);

  requestAnimationFrame(loop);
}

for(let i=0;i<4;i++){spTree('left');spTree('right');}
for(let i=0;i<3;i++)spBB();
for(let i=0;i<4;i++)spCar();
requestAnimationFrame(loop);

// ═══ MUSIC ═══════════════════════════════════════
let TRX=[{name:'track1',url:'music/track1.mp3'}],TI=0;
const AU=document.getElementById('au');let IP=false;
AU.src=TRX[0].url;AU.preload='auto';
document.getElementById('tn').textContent='♪ '+TRX[0].name;
document.getElementById('tn').classList.add('on');
let started=false;
function tryAP(e){
  if(started)return;
  const el=e.target;
  if(el.closest('#pl')||el.closest('#ctrl-bar')||el.closest('#topbar'))return;
  started=true;
  AU.play().then(()=>{IP=true;document.getElementById('py').textContent='⏸';}).catch(()=>{started=false;});
}
document.addEventListener('touchstart',tryAP,{passive:true});
document.addEventListener('click',tryAP);
function ldTrk(i){if(!TRX.length)return;TI=((i%TRX.length)+TRX.length)%TRX.length;AU.src=TRX[TI].url;document.getElementById('tn').textContent='♪ '+TRX[TI].name;document.getElementById('tn').classList.add('on');if(IP)AU.play();}
document.getElementById('fi').addEventListener('change',e=>{Array.from(e.target.files).forEach(f=>TRX.push({name:f.name.replace(/\.[^.]+$/,''),url:URL.createObjectURL(f)}));if(!IP)ldTrk(TRX.length-1);e.target.value='';});
document.getElementById('ub').addEventListener('click',()=>document.getElementById('fi').click());
document.getElementById('py').addEventListener('click',()=>{if(!TRX.length){document.getElementById('fi').click();return;}if(IP){AU.pause();IP=false;document.getElementById('py').textContent='▶';}else{AU.play();IP=true;document.getElementById('py').textContent='⏸';}});
document.getElementById('pp').addEventListener('click',()=>ldTrk(TI-1));
document.getElementById('pn').addEventListener('click',()=>ldTrk(TI+1));
AU.addEventListener('ended',()=>ldTrk(TI+1));

// ═══ ADS ═════════════════════════════════════════
function loadAd(src){fetch(src).then(r=>r.blob()).then(b=>{const img=new Image();img.src=URL.createObjectURL(b);img.onload=()=>bbImgs.push(img);}).catch(()=>{const img=new Image();img.src=src;img.onload=()=>bbImgs.push(img);});}
loadAd('ads/logo1.png');
document.getElementById('abb').addEventListener('click',()=>document.getElementById('abf').click());
document.getElementById('abf').addEventListener('change',e=>{Array.from(e.target.files).forEach(f=>{const img=new Image();img.src=URL.createObjectURL(f);img.onload=()=>bbImgs.push(img);});e.target.value='';});

// ═══ PWA ═════════════════════════════════════════
let dp=null;
addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;const ib=document.getElementById('ib');ib.classList.add('show');ib.onclick=async()=>{ib.classList.remove('show');dp.prompt();await dp.userChoice;dp=null;};});
addEventListener('appinstalled',()=>document.getElementById('ib').classList.remove('show'));
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
